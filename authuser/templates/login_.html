{% extends 'main.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            
            <div class="text-center mb-4">
                <i class="fa-solid fa-user-circle fa-4x text-primary mb-3"></i>
                <h2 class="fw-bold">Welcome Back</h2>
                <p class="text-muted">Sign in to continue to ShopSphere</p>
            </div>

            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-body p-5">
                    
                    {% if wrong %}
                    <div class="alert alert-danger d-flex align-items-center mb-4" role="alert">
                        <i class="fa-solid fa-triangle-exclamation me-2"></i>
                        <div>Incorrect username or password. Please try again.</div>
                    </div>
                    {% endif %}

                    <form action="" method="post">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label for="username" class="form-label fw-bold text-secondary text-uppercase" style="font-size: 0.8rem;">Username</label>
                            <div class="input-group input-group-lg shadow-sm">
                                <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-solid fa-user"></i></span>
                                <input type="text" name="username" id="username" class="form-control border-start-0 ps-0" placeholder="Enter your username" required>
                            </div>
                        </div>

                        <div class="mb-5">
                            <label for="password" class="form-label fw-bold text-secondary text-uppercase" style="font-size: 0.8rem;">Password</label>
                            <div class="input-group input-group-lg shadow-sm">
                                <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-solid fa-lock"></i></span>
                                <input type="password" name="password" id="password" class="form-control border-start-0 ps-0" placeholder="••••••••" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-pill shadow-sm mb-4 py-3">
                            Login <i class="fa-solid fa-arrow-right ms-2"></i>
                        </button>
                    </form>

                    <p class="text-center text-muted mb-0">
                        Don't have an account? <a href="{% url 'register_' %}" class="fw-bold text-primary text-decoration-none">Sign up here</a>
                    </p>
                </div>
            </div>
            
        </div>
    </div>
</div>
{% endblock content %}
