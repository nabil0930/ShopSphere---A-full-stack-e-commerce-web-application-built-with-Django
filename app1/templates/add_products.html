{% extends 'main.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-header bg-dark text-white text-center py-4 rounded-top-4">
                    <h3 class="mb-0 fw-bold"><i class="fa-solid fa-plus-circle me-2 text-warning"></i>Add New Product</h3>
                </div>
                <div class="card-body p-5">
                    
                    <form action="" method="post" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label for="category_attr" class="form-label fw-bold text-secondary">Product Category</label>
                            <select name="category_attr" id="category_attr" class="form-select form-select-lg shadow-sm" required>
                                <option value="" disabled selected>Select Category</option>
                                {% for i in category %}
                                <option value="{{i.category_name}}">{{i.category_name}}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="product_name" class="form-label fw-bold text-secondary">Product Name</label>
                            <input type="text" name="product_name" id="product_name" class="form-control form-control-lg shadow-sm" placeholder="Enter product name" required>
                        </div>

                        <div class="mb-4">
                            <label for="product_desc" class="form-label fw-bold text-secondary">Product Description</label>
                            <textarea name="product_desc" id="product_desc" class="form-control shadow-sm" rows="3" placeholder="Enter product description" required></textarea>
                        </div>

                        <div class="mb-4">
                            <label for="product_price" class="form-label fw-bold text-secondary">Product Price (₹)</label>
                            <div class="input-group input-group-lg shadow-sm">
                                <span class="input-group-text bg-light border-end-0">₹</span>
                                <input type="number" step="0.01" name="product_price" id="product_price" class="form-control border-start-0 ps-0" placeholder="0.00" required>
                            </div>
                        </div>

                        <div class="mb-5">
                            <label for="product_image" class="form-label fw-bold text-secondary">Product Image</label>
                            <input type="file" name="product_image" id="product_image" class="form-control form-control-lg shadow-sm" accept="image/*" required>
                        </div>

                        <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold shadow">
                            <i class="fa-solid fa-cloud-arrow-up me-2"></i>Publish Product
                        </button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
